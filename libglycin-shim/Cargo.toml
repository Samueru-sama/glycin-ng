[package]
name = "glycin-ng-libglycin-shim"
version = "0.1.0"
edition = "2024"
rust-version = "1.87"
description = "libglycin-2.so.0 compat shim that forwards to glycin-ng"
license = "MIT OR Apache-2.0"

[lib]
crate-type = ["cdylib"]
name = "glycin_2"
path = "src/lib.rs"

[dependencies]
libc = "0.2"

[dependencies.glycin-ng]
path = ".."
default-features = false
features = [
  "bmp",
  "dds",
  "decode",
  "exr",
  "gif",
  "ico",
  "jpeg",
  "jxl",
  "landlock",
  "metadata",
  "png",
  "pnm",
  "qoi",
  "seccomp",
  "svg",
  "tga",
  "tiff",
  "webp",
]
