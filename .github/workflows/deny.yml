name: cargo-deny

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  cargo-deny:
    name: cargo deny check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          # Surface all four checks individually in the job log even
          # if an earlier one fails, so a single CI run shows every
          # category of finding.
          arguments: --all-features --workspace
          rust-version: stable
