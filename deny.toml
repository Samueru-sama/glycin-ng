[graph]
all-features = true

[licenses]
confidence-threshold = 0.93
allow = [
  "0BSD",
  "MIT",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "Zlib",
  "Unicode-3.0",
  "Unlicense",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
deny = []

[advisories]
yanked = "deny"
ignore = [
  # ttf-parser is unmaintained with no safe upgrade. It is pulled in
  # transitively through resvg/usvg and cannot be replaced independently.
  "RUSTSEC-2026-0192",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
